name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Fix Project Structure
      # यह स्टेप आपकी सभी बाहर बिखरी फाइलों को ऑटोमैटिक सही एंड्रॉइड फोल्डर स्ट्रक्चर में डाल देगा
      run: |
        # सही डायरेक्टरी स्ट्रक्चर बनाना
        mkdir -p app/src/main/java/com/example
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/res/drawable

        # मुख्य फाइलों को मूव करना
        [ -f build.gradle.kts ] && mv build.gradle.kts app/ || true
        [ -f proguard-rules.pro ] && mv proguard-rules.pro app/ || true
        [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/ || true
        
        # सभी Kotlin (.kt) फाइलों को सही पैकेज फोल्डर में डालना
        mv *.kt app/src/main/java/com/example/ 2>/dev/null || true
        
        # सभी एक्सएमएल (.xml) और इमेजेस को सही रिसोर्स फोल्डर में डालना
        mv colors.xml strings.xml themes.xml backup_rules.xml data_extraction_rules.xml app/src/main/res/values/ 2>/dev/null || true
        mv ic_launcher*.xml app/src/main/res/mipmap-anydpi-v26/ 2>/dev/null || true
        mv *.webp *.png app/src/main/res/drawable/ 2>/dev/null || true

        # रूट में एक सही settings.gradle.kts बनाना
        echo 'include(":app")' > settings.gradle.kts

        # गायब gradlew फाइल को जनरेट करना
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: |
          **/build/outputs/apk/debug/*.apk
