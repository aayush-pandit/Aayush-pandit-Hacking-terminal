name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Arrange Files Into Standard Structure
      run: |
        mkdir -p app/src/main/java/com/example
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/res/drawable
        mkdir -p gradle

        if [ -f libs.versions.toml ]; then mv libs.versions.toml gradle/; fi
        if [ -f build.gradle.kts ]; then mv build.gradle.kts app/; fi
        if [ -f proguard-rules.pro ]; then mv proguard-rules.pro app/; fi
        if [ -f AndroidManifest.xml ]; then mv AndroidManifest.xml app/src/main/; fi
        
        mv *.kt app/src/main/java/com/example/ 2>/dev/null || true
        mv colors.xml strings.xml themes.xml backup_rules.xml data_extraction_rules.xml app/src/main/res/values/ 2>/dev/null || true
        mv ic_launcher*.xml app/src/main/res/mipmap-anydpi-v26/ 2>/dev/null || true
        mv *.webp *.png app/src/main/res/drawable/ 2>/dev/null || true

        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: |
          **/build/outputs/apk/debug/*.apk
