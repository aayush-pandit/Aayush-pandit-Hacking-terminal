name: Android Final Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Automatic Project Fixer
      # यह स्टेप आपकी सभी कोडिंग फाइलों को ऑटोमैटिक एक स्टैंडर्ड एंड्रॉइड ढांचे में सजा देगा
      run: |
        rm -rf app build.gradle.kts settings.gradle.kts gradlew gradle .gradle
        mkdir -p app/src/main/java/com/example
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/res/drawable
        
        [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/ || true
        [ -f proguard-rules.pro ] && mv proguard-rules.pro app/ || true
        [ -f gradle.properties ] && cp gradle.properties app/ || true
        [ -f local.properties ] && cp local.properties app/ || true
        
        mv *.kt app/src/main/java/com/example/ 2>/dev/null || true
        mv colors.xml strings.xml themes.xml backup_rules.xml data_extraction_rules.xml app/src/main/res/values/ 2>/dev/null || true
        mv ic_launcher*.xml app/src/main/res/mipmap-anydpi-v26/ 2>/dev/null || true
        mv *.webp *.png app/src/main/res/drawable/ 2>/dev/null || true

        # Manifest में से गायब रिसोर्सेज को सिस्टम की डिफ़ॉल्ट वैल्यू से बदलना
        if [ -f app/src/main/AndroidManifest.xml ]; then
          sed -i 's/android:theme="@style\/Theme.MyApplication"/android:theme="@android:style\/Theme.DeviceDefault"/' app/src/main/AndroidManifest.xml
          sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@android:mipmap\/sym_def_app_icon"/' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="[^"]*"//g' app/src/main/AndroidManifest.xml
          sed -i 's/android:dataExtractionRules="[^"]*"//g' app/src/main/AndroidManifest.xml
          sed -i 's/android:fullBackupContent="[^"]*"//g' app/src/main/AndroidManifest.xml
        fi

        # 100% सही और साफ settings.gradle.kts
        echo '
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        rootProject.name = "Aayush-pandit-Hacking-terminal"
        include(":app")
        ' > settings.gradle.kts

        # 100% सही build.gradle.kts (जिसमें ग्रेडल का वर्जन पूरी तरह फिक्स है)
        echo '
        plugins {
            id("com.android.application") version "8.1.0"
            id("org.jetbrains.kotlin.android") version "1.8.20"
        }
        android {
            namespace = "com.example"
            compileSdk = 34
            defaultConfig {
                applicationId = "com.aistudio.hackingterminal.aypaht"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
            kotlinOptions { jvmTarget = "17" }
            buildFeatures { compose = true }
            composeOptions { kotlinCompilerExtensionVersion = "1.4.6" }
        }
        dependencies {
            implementation("androidx.core:core-ktx:1.10.1")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.1")
            implementation("androidx.activity:activity-compose:1.7.2")
            implementation(platform("androidx.compose:compose-bom:2023.05.01"))
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.ui:ui-graphics")
            implementation("androidx.compose.ui:ui-tooling-preview")
            implementation("androidx.compose.material3:material3")
        }
        ' > app/build.gradle.kts

    - name: Setup Official Gradle
      # गिटहब के इंटरनल ग्रेडल को हटाकर यह स्टेप बिल्कुल सही और कंपैटिबल ग्रेडल 8.1 लोड करेगा
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1
        cache-disabled: true

    - name: Run Build APK
      # बिना किसी पुराने कैशे या डीमन एरर के सीधे फ्रेश ऐप जनरेट करना
      run: ./gradlew assembleDebug --no-daemon --no-build-cache --no-configuration-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: |
          app/build/outputs/apk/debug/*.apk
