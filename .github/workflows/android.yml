name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "gradlew file not found in root, searching in subdirectories..."
          find . -name gradlew -exec chmod +x {} \;
        fi

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug
        else
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found anywhere in the repository."
            exit 1
          fi
          DIR=$(dirname "$GRADLEW_PATH")
          cd "$DIR" && ./gradlew assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: |
          **/build/outputs/apk/debug/*.apk
