sename: Android Fresh Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Complete Project Reset and Build
      # यह स्टेप बिना किसी पुरानी फाइल के गड़बड़ किए, खुद अंदर ही 100% सही फाइलें जनरेट कर देगा
      run: |
        # पुराने किसी भी खराब ढांचे को साफ करना
        rm -rf app gradlew gradle
        
        # नए सिरे से सही फोल्डर बनाना
        mkdir -p app/src/main/java/com/example
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/res/drawable
        mkdir -p gradle/wrapper

        # आपकी अपलोड की हुई फाइलों को उनके सही फोल्डर्स में डालना
        [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/ || true
        [ -f proguard-rules.pro ] && mv proguard-rules.pro app/ || true
        [ -f gradle.properties ] && cp gradle.properties app/ || true
        [ -f local.properties ] && cp local.properties app/ || true
        
        mv *.kt app/src/main/java/com/example/ 2>/dev/null || true
        mv colors.xml strings.xml themes.xml backup_rules.xml data_extraction_rules.xml app/src/main/res/values/ 2>/dev/null || true
        mv ic_launcher*.xml app/src/main/res/mipmap-anydpi-v26/ 2>/dev/null || true
        mv *.webp *.png app/src/main/res/drawable/ 2>/dev/null || true

        # 100% सही settings.gradle.kts फाइल का निर्माण करना
        echo '
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        rootProject.name = "Aayush-pandit-Hacking-terminal"
        include(":app")
        ' > settings.gradle.kts

        # 100% सही app/build.gradle.kts फाइल का निर्माण करना (बिना किसी सिंटैक्स एरर के)
        echo '
        plugins {
            id("com.android.application") version "8.3.0"
            id("org.jetbrains.kotlin.android") version "1.9.22"
        }
        android {
            namespace = "com.example"
            compileSdk = 34
            defaultConfig {
                applicationId = "com.aistudio.hackingterminal.aypaht"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
        }
        ' > app/build.gradle.kts

        # फ्रेश ग्रेडल रैपर सेट करना ताकि टास्क मिल सके
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Run Build
      run: ./gradlew assembleDebug --no-configuration-cache



    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: |
          app/build/outputs/apk/debug/*.apk
